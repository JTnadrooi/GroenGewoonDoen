<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Login - GroenGewoonDoen</title>
	<link rel="icon" type="image/png" href="/favicon.png">
	<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

	<header id="site-header"></header>

	<main class="page-main">
		<section class="login-card">
			<h1>Sign in</h1>

			<form id="loginForm" action="/login" method="post" novalidate>
				<label for="email">Email</label>
				<input id="email" name="email" type="email" placeholder="you@domain.com" required>

				<label for="password">Password</label>
				<input id="password" name="password" type="password" placeholder="•••••••" required>

				<div class="form-row">
					<label class="inline"><input type="checkbox" id="remember" name="remember"> Remember me</label>
					<button id="loginButton" type="submit" class="btn-primary">Sign in</button>
				</div>

				<div id="error" class="form-error" aria-live="polite"></div>
			</form>

			<p class="muted">
				<a href="/">Back to homepage</a> |
				<a href="/signup">Create account</a>
			</p>
		</section>
	</main>

	<script src="../js/siteHeader.js"></script>
	<script type="module" src="../js/login.js"></script>
</body>

</html>
