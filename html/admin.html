<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Admin</title>

  <link rel="stylesheet" href="../css/styles.css" />
  <script>
    // Check if user has valid session before loading
    (function() {
      const sessionId = localStorage.getItem('sessionId');
      if (!sessionId) {
        window.location.href = '/html/login.html';
        return;
      }
      // Store sessionId globally for use in fetch calls
      window.sessionId = sessionId;
    })();
  </script>
  <script src="../js/FoldMenu.js" defer></script>
  <script src="../js/main.js" defer></script>
  <script src="../js/calendar.js" defer></script>
</head>

<body>
  <header data-fold>
    <h2>Green & Just Do It</h2><br />
    <p>Welcome admin!</p>
    <p>Check your availability here!</p>
  </header>

<div data-fold>
  <h3>Availability Calendar</h3>

  <table border="1" cellpadding="8" cellspacing="0">
    <thead>
      <tr>
        <th>Day</th>
        <th>Date</th>
        <th>Status</th>
        <th>Details</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="admin-calendar-body">
      </tbody>
  </table>
</div>
  <br><br>
  <button>Logout</button>
</body>

</html>
