<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Dashboard - GroenGewoonDoen</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <main class="page-main">
    <section class="login-card">
      <h1>Admin calendar</h1>

      <div class="form-row">
        <button type="button" class="btn-primary" onclick="logout()">Logout</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Day</th>
            <th>Date</th>
            <th>Status</th>
            <th>Details</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="admin-calendar-body"></tbody>
      </table>
    </section>
  </main>

  <script type="module">
    import { apiFetch, getBackendOrigin } from "../js/api.js";

    async function logout() {
      try {
        const result = await apiFetch("/logout", {
          method: "POST",
          headers: {
            "Accept": "application/json"
          }
        });

        const data = await result.res.json().catch(() => ({}));
        window.location.href = result.origin + (data.redirect || "/login");
      } catch (e) {
        console.error("Logout failed:", e);

        try {
          const origin = await getBackendOrigin();
          window.location.href = origin + "/login";
        } catch {
          window.location.href = "/html/login.html";
        }
      }
    }

    window.logout = logout;
  </script>

  <script src="../js/siteHeader.js"></script>
  <script src="../js/foldmenu.js"></script>
  <script src="../js/calendar.js"></script>
</body>

</html>
