<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up - GroenGewoonDoen</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

  <header id="site-header"></header>

  <main class="page-main">
    <section class="login-card">
      <h1>Create account</h1>

      <form id="signupForm" action="/newuser" method="post" novalidate>
        <label for="name">Full name</label>
        <input id="name" name="name" type="text" placeholder="Your name" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@domain.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="•••••••" required>

        <label for="confirm">Confirm password</label>
        <input id="confirm" name="confirm" type="password" placeholder="•••••••" required>

        <div class="form-row">
          <button id="signupButton" type="submit" class="btn-primary">Sign up</button>
        </div>

        <div id="error" class="form-error" aria-live="polite"></div>
      </form>

      <p class="muted">
        Already have an account? <a href="/html/login.html">Log in</a><br>
        <a href="/">Back to homepage</a>
      </p>
    </section>
  </main>

  <script src="../js/siteHeader.js"></script>
  <script type="module" src="../js/signup.js"></script>
</body>

</html>
