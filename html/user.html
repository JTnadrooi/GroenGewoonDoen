<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>

  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="../css/styles.css" />

  <script src="../js/foldmenu.js" defer></script>
</head>

<body>
  <h1>Customer Side (Users)</h1>

  <header data-fold>
    <h2>Green & Just Do It</h2><br />
    <p>Welcome!</p>
    <p>Order your garden services easily online!</p>
  </header>

  <main data-fold>
    <h2>Order a Package</h2>

    <label for="packages">Select Package:</label>
    <select id="packages"></select>

    <p id="packageDescription"></p>

    <div id="gardenSizeContainer">
      <label for="gardenSize">Garden Size (m²):</label>
      <input type="number" id="gardenSize" min="1" placeholder="Enter your garden size">
    </div>

    <div id="customDurationContainer" style="display:none;">
      <label for="customDuration">Custom Duration (hours):</label>
      <input type="number" id="customDuration" min="1" placeholder="Enter duration in hours">
    </div>

    <p id="costPrediction"></p>

    <label for="orderDate">Select Date & Time:</label>
    <input type="datetime-local" id="orderDate">
    <button id="placeOrderBtn" type="button">Place Order</button>

    <p id="orderInfo"></p>
  </main>

  <article data-fold>
    <h2>My Orders</h2>

    <table style="width: 100%">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Package / Info</th>
          <th>Quote</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody id="ordersTableBody">
      </tbody>
    </table>
  </article>

  <footer data-fold>
    <p>Contact | Social Media | Disclaimer</p>
  </footer>

  <a href="/admin">Go to admin page</a>

  <script type="module" src="../js/main.js"></script>
</body>

</html>
