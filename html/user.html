<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>

  <!-- The main CSS -->
  <link rel="stylesheet" href="../css/styles.css" />

  <!-- Fold script -->
  <script src="../js/FoldMenu.js" defer></script>
</head>

<body>
  <h1>Customer Side (Users)</h1>

  <header data-fold>
    <h2>Green & Just Do It</h2><br />
    <p>Welcome!</p>
    <p>Order your garden services easily online!</p>
  </header>

  <article data-fold>
    <h2>Packages</h2>

    <label for="packages">Choose a Package</label>
    <select id="packages"></select>

    <p id="packageDescription" style="margin:8px 0; font-style: italic;"></p>

    <label for="area">Garden Size (m²)</label>
    <input type="number" id="area" min="0" step="1" placeholder="Enter m²" />

    <h3 style="margin-top:10px;">
      Total: $<span id="totalPrice">0.00</span>
    </h3>

    <button onclick="placeOrder()">Order</button>
  </article>

  <article data-fold>
    <h2>My Orders</h2>
    <button>Order</button>

    <table style="width: 100%">
      <tr>
        <th>Order ID</th>
        <th>Package / Info</th>
        <th>Quote</th>
        <th>Status</th>
        <th>Date</th>
      </tr>
      <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
      </tr>
      <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    </table>
  </article>

  <!-- Make footer collapsible too if you want (optional).
       Remove data-fold if you don't want it foldable. -->
  <footer data-fold>
    <p>Contact | Social Media | Disclaimer</p>
  </footer>

  <a href="../admin.html">Go to admin page</a>

  <!-- script -->
  <script src="../js/main.js"></script>
</body>

</html>
